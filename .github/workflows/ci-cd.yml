name: AI-Newsroom CI/CD

# defineste evenimentele declansatoare
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1. pipeline CI: verificam codul (python + react)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4                   # descarca codul proiectului din repo pe calculatorul virtual

      - name: Set up Python
        uses: actions/setup-python@v4               # instaleaza python 3.10 + dependentele
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js                        # configurare si build react
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: frontend-react
        run: npm install

      - name: Build Frontend
        working-directory: frontend-react
        run: npm run build                          # compileaza proiectul (verifica daca app react compileaza fara erori)

        # ruleaza linter-ul
      - name: Lint with Ruff
        run: ruff check .

        # ruleaza testele automate cu pytest (asigura ca functionalitatile vechi inca merg si ca logica noua este corecta)
      - name: Run Automated Tests
        run: PYTHONPATH=. pytest tests/

        # ruleaza script-urile care evalueaza performanta agentilor AI
      - name: Run AI Agent Evals
        run: python scripts/ai_evals.py


  # 2. pipeline CD: publica imaginea Docker în gitHub container registry
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                               # acorda permisiunea de a incarca imaginea docker in repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3                # autentificare automata si securizata in gitHub packages
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5             # genereaza tag-uri 
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5           # construieste si livreaza (push) imaginea in mod real
        with:
          context: .
          push: true                               
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: CD Confirmation Log
        run: echo "Imaginea a fost publicată cu succes în GitHub Packages!"