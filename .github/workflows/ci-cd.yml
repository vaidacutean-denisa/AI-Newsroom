name: AI-Newsroom CI/CD

# defineste evenimentele declansatoare
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1. pipeline CI: verificam codul (python + react)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4                   # descarca codul proiectului din repo pe calculatorul virtual

      - name: Set up Python
        uses: actions/setup-python@v4               # instaleaza python 3.10 + dependentele
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js                        # configurare si build react
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: frontend-react
        run: npm install

      - name: Build Frontend
        working-directory: frontend-react
        run: npm run build                          # compileaza proiectul (verifica daca app react compileaza fara erori)

        # ruleaza linter-ul
      - name: Lint with Ruff
        run: ruff check .

        # ruleaza testele automate cu pytest (asigura ca functionalitatile vechi inca merg si ca logica noua este corecta)
      - name: Run Automated Tests
        run: PYTHONPATH=. pytest tests/

        # ruleaza script-urile care evalueaza performanta agentilor AI
      - name: Run AI Agent Evals
        run: python scripts/ai_evals.py

  # 2. pipeline cd: se declanseaza doar pe push in main/develop, daca testele au trecut
  deploy:
    # ruleaza doar daca primul job s-a terminat cu succes (la push pe main sau develop)
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Backend)
        run: |
          docker build -t ai-newsroom-backend:latest .                  # construieste imaginile de productie pentru a impachea aplicatia finala intr-un container
          echo "CD Pas executat: Imaginea de Docker pentru Backend a fost construită cu succes!"


